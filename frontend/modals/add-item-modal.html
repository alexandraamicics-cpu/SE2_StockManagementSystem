<div class="modal-shell modal-item-form">
  <div class="modal-header">
    <h2>Add New Item / Edit Item</h2>
    <button class="close-btn" type="button">&times;</button>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>Item Name *</label><input class="input" type="text" placeholder="e.g. Nike Dunk Low"></div>
    <div class="form-group"><label>SKU / Style Code *</label><input class="input" type="text" placeholder="e.g. DD1391-100"></div>
    <div class="form-group"><label>Colorway *</label><input class="input" type="text" placeholder="e.g. Orange Paisley"></div>
    <div class="form-group"><label>Brand</label><select class="input"><option>-- Select Brand --</option><option>Nike</option><option>Adidas</option><option>Puma</option><option>New Balance</option><option>Others</option></select></div>
    <div class="form-group"><label>Target Quantity <em>(For Waiting Stock Threshold)</em> *</label><input class="input" type="number" min="1" step="1" placeholder="e.g. 5"></div>
  </div>
  <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:14px;">
    <button class="secondary-btn" type="button">Cancel</button>
    <button class="solid-btn" type="button">Create Item / Save Changes</button>
  </div>
</div>
