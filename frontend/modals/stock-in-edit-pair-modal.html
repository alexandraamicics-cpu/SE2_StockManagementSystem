<div class="modal-shell modal-pair-form">
  <div class="modal-header"><h3>Stock In New Pair / Edit Pair Details</h3><button class="close-btn" type="button">&times;</button></div>
  <div class="form-grid">
    <div class="form-group"><label>Pair ID</label><input class="input" type="text" value="P-001" disabled></div>
    <div class="form-group"><label>US Size *</label><input class="input" type="text" placeholder="e.g. 7, 8.5, 10"></div>
    <div class="form-group"><label>Gender *</label><select class="input"><option>-- Select Gender --</option><option>Male</option><option>Female</option></select></div>
    <div class="form-group"><label>Condition *</label><select class="input"><option>New</option><option>Like New</option><option>Good</option><option>Fair</option></select></div>
    <div class="form-group"><label>Cost Price (Php) *</label><input class="input" type="number"></div>
    <div class="form-group"><label>Selling Price (Php) *</label><input class="input" type="number"></div>
  </div>
  <div style="display:flex; gap:10px; margin-top:14px;"><button class="solid-btn" type="button">Save Pair / Save Changes</button><button class="secondary-btn" type="button">Cancel</button></div>
</div>
