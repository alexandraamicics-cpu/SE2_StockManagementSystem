<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1800 Soles | Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="settings">
  <aside class="sidebar">
    <div class="brand"><img src="/images/logo.png" alt="1800 Soles logo"><span>1800<br>SOLES</span></div>
    <div class="menu">
      <a data-page="home" href="/home.html"><i class="fa fa-house"></i> HOME</a>
      <a data-page="inventory" href="/inventory.html"><i class="fa fa-box"></i> INVENTORY</a>
      <a data-page="analytics" href="/analytics.html"><i class="fa fa-chart-column"></i> ANALYTICS</a>
      <a data-page="settings" class="active" href="/settings.html"><i class="fa fa-gear"></i> SETTINGS</a>
    </div>
    <div class="logout">
      <button id="logoutBtn"><i class="fa fa-right-from-bracket"></i> LOG OUT</button>
    </div>
  </aside>

  <main class="content">
    <h1 class="page-title center-title">Settings</h1>
    <p class="page-sub center-sub">Manage your account preferences and security</p>
    <div class="card">
      <h3 style="margin-top:0;">Profile Information</h3>
      <div class="profile-layout">
        <div class="profile-row profile-row-1">
          <div class="form-group">
            <label>User ID</label>
            <input class="input" id="setUserId" disabled>
          </div>
          <div class="form-group">
            <label>Role *</label>
            <input class="input" id="setRole" disabled>
          </div>
        </div>

        <div class="profile-row profile-row-2">
          <div class="form-group">
            <label>Last Name *</label>
            <input class="input" id="setLastName" placeholder="Enter last name">
          </div>
          <div class="form-group">
            <label>First Name *</label>
            <input class="input" id="setFirstName" placeholder="Enter first name">
          </div>
          <div class="form-group">
            <label>Middle Name *</label>
            <input class="input" id="setMiddleName" placeholder="Enter middle name">
          </div>
          <div class="form-group">
            <label>Suffix</label>
            <select class="input" id="setSuffix">
              <option value="">Suffix</option>
              <option value="Jr.">Jr.</option>
              <option value="II">II</option>
              <option value="III">III</option>
            </select>
          </div>
        </div>

        <div class="profile-row profile-row-3">
          <div class="form-group">
            <label>Gender *</label>
            <select class="input" id="setGender" disabled>
              <option value="">Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label>Phone Number (+639) *</label>
            <div class="phone-input-wrap">
              <span class="phone-prefix">+639</span>
              <input class="input phone-input" id="setPhone" inputmode="numeric" maxlength="9" placeholder="123456789">
            </div>
          </div>
          <div class="form-group">
            <label>Username *</label>
            <input class="input" id="setUsername" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input class="input" id="setEmail" placeholder="Enter email">
          </div>
        </div>
      </div>
      <button class="outlined-btn" id="saveProfileBtn">Save Profile</button>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3 style="margin-top:0;">Security Settings</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" class="input" id="curPass" placeholder="Enter current password">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" class="input" id="newPass" placeholder="At least 8 chars, uppercase, lowercase, number, special">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" class="input" id="newPass2" placeholder="Repeat new password">
        </div>
      </div>
      <div style="background:#fff8ec; padding:10px 12px; border-radius:10px; color:#a16a1d; font-size:14px; margin-bottom:12px;">
        Password Tips: Leave all password fields blank if you don’t want to change your password. Make sure your new password is strong and unique.
      </div>
      <button class="solid-btn" id="savePassBtn"><i class="fa fa-save"></i> Save Changes</button>
    </div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="genericModal"></div></div>
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
